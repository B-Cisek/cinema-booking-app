services:
  app:
    container_name: cinema-app
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: app
    environment:
      AUTORUN_ENABLED: ${AUTORUN_ENABLED:-true}
      AUTORUN_LARAVEL_OPTIMIZE: ${AUTORUN_LARAVEL_OPTIMIZE:-true}
      AUTORUN_LARAVEL_CONFIG_CACHE: ${AUTORUN_LARAVEL_CONFIG_CACHE:-true}
      AUTORUN_LARAVEL_MIGRATION: ${AUTORUN_LARAVEL_MIGRATION:-true}
      AUTORUN_DEBUG: ${AUTORUN_DEBUG:-true}
      PHP_DATE_TIMEZONE: ${PHP_DATE_TIMEZONE:-Europe/Warsaw}
      PHP_OPCACHE_ENABLE: ${PHP_OPCACHE_ENABLE:-1}
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.http.routers.cinema.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.cinema.entrypoints=websecure
      - traefik.http.routers.cinema.tls=true
      - traefik.http.routers.cinema.tls.certresolver=cloudflare
      - traefik.http.services.cinema.loadbalancer.server.port=8080
    networks:
      - cinema
      - traefik
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      ssr:
        condition: service_started

  ssr:
    container_name: cinema-ssr
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: ssr
    command: ["node", "bootstrap/ssr/app.js"]
    expose:
      - "13714"
    networks:
      - cinema

  database:
    container_name: cinema-database
    image: postgres:18.1-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-cinema}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-cinema}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cinema} -d ${DB_DATABASE:-cinema}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cinema

  redis:
    container_name: cinema-redis
    image: redis:8.0.2-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cinema

volumes:
  postgres_data:
  redis_data:

networks:
  cinema:
    driver: bridge
  traefik:
    external: true
