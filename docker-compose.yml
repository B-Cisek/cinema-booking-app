services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    environment:
      PHP_DATE_TIMEZONE: ${APP_TZ:-Europe/Warsaw}
    ports:
      - "80:8080"
    volumes:
      - ./:/var/www/html
    networks:
      - cinema
    depends_on:
      - database
      - redis

  database:
    container_name: cinema-database
    image: postgres:18.1-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-cinema}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-cinema}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cinema

  redis:
    container_name: cinema-redis
    image: redis:8.0.2-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cinema

volumes:
  postgres_data:
  redis_data:

networks:
  cinema:
    driver: bridge
